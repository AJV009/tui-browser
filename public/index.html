<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TUI">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>TUI Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <a href="/#dashboard" style="text-decoration:none">
      <h1 id="header-title">TUI Browser <span id="version-label" class="version-label"></span></h1>
      <div id="updated-label" class="updated-label"></div>
    </a>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="install-btn" class="nav-btn nav-btn-icon" style="display:none" title="Install App"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M4.5 7L8 10.5 11.5 7"/><path d="M2 12v2h12v-2"/></svg></button>
      <button id="refresh-btn" class="nav-btn nav-btn-icon" title="Force refresh"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4"/><path d="M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1.5v3h3"/><path d="M4.5 14.5v-3h-3"/></svg></button>
      <button id="back-btn" class="nav-btn nav-btn-icon" style="display:none" title="Dashboard"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7.5L8 2l6 5.5"/><path d="M3.5 6.5V14H7v-4h2v4h3.5V6.5"/></svg></button>
    </div>
  </div>

  <!-- Dashboard View -->
  <div id="dashboard-view">
    <div class="dashboard-content">
      <div class="dashboard-toolbar">
        <h2>Sessions</h2>
        <div class="toolbar-right">
          <form id="create-session-form" class="create-form">
            <input id="new-session-name" type="text" placeholder="Session name" autocomplete="off">
            <input id="new-session-cmd" type="text" placeholder="Command (default: bash)" autocomplete="off">
            <div class="create-form-actions">
              <div id="shortcuts-dropdown" class="shortcuts-dropdown">
                <button id="shortcuts-btn" class="btn btn-secondary" type="button"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7.5 1L3 8h3.5L5.5 13 11 6H7.5z"/></svg> Quick Launch</button>
                <div id="shortcuts-menu" class="shortcuts-menu hidden"></div>
              </div>
              <button type="submit" class="btn btn-primary btn-icon" title="New session"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 3v12M3 9h12"/></svg></button>
            </div>
          </form>
          <select id="sort-select" class="sort-select" title="Sort sessions">
            <option value="recent">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="active">Recently active</option>
            <option value="idle">Least active</option>
          </select>
        </div>
      </div>
      <div id="session-list"></div>
    </div>
  </div>

  <!-- Terminal View -->
  <div id="terminal-view" class="hidden">
    <div class="terminal-toolbar">
      <span class="session-label" id="terminal-session-name" title="Click to rename"></span>
      <button id="ai-title-btn" class="ai-title-btn" title="AI-generate title"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5l1.2 3.3 3.3 1.2-3.3 1.2L8 10.5 6.8 7.2 3.5 6 6.8 4.8z"/><path d="M3 12l.6 1.4L5 14l-1.4.6L3 16l-.6-1.4L1 14l1.4-.6z"/><path d="M12 10l.5 1 1 .5-1 .5-.5 1-.5-1-1-.5 1-.5z"/></svg></button>
      <input class="session-label-edit hidden" id="terminal-session-name-edit" type="text" autocomplete="off" spellcheck="false">
      <div class="connection-status">
        <button id="reconnect-btn" class="reconnect-btn" style="display:none" title="Reconnect">&#x21bb;</button>
        <span class="status-dot" id="terminal-status-dot"></span>
        <span id="terminal-status-text">Disconnected</span>
        <button id="terminal-kill-btn" class="terminal-kill-btn" title="Kill session">&#x2715;</button>
      </div>
    </div>
    <div id="terminal-container"></div>
    <div id="scroll-controls" class="scroll-controls">
      <div class="zoom-pill">
        <button id="zoom-in-btn" class="zoom-pill-btn" title="Zoom in">+</button>
        <span id="zoom-level" class="zoom-pill-level"><svg width="9" height="8" viewBox="0 0 9 8" fill="currentColor" style="vertical-align:middle;margin-right:2px"><text x="0" y="7" font-size="8" font-weight="700" font-family="sans-serif">F</text><text x="5" y="7" font-size="6" font-weight="600" font-family="sans-serif">f</text></svg><span id="zoom-value">14</span></span>
        <button id="zoom-out-btn" class="zoom-pill-btn" title="Zoom out">-</button>
      </div>
      <div class="scroll-pill">
        <button id="scroll-up" class="scroll-pill-btn" title="Scroll up">&uarr;</button>
        <span class="scroll-pill-icon"><svg width="12" height="16" viewBox="0 0 12 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="14" rx="5"/><line x1="6" y1="4" x2="6" y2="7"/></svg></span>
        <button id="scroll-down" class="scroll-pill-btn" title="Scroll down">&darr;</button>
      </div>
    </div>
    <div id="terminal-quickbar" class="terminal-quickbar">
      <button class="qk" data-qk="esc">Esc</button>
      <button class="qk" data-qk="tab">Tab</button>
      <button class="qk" data-qk="ctrl-c">^C</button>
      <button class="qk" data-qk="ctrl-d">^D</button>
      <button class="qk" data-qk="ctrl-z">^Z</button>
      <span class="qk-sep"></span>
      <button class="qk" data-qk="up">&uarr;</button>
      <button class="qk" data-qk="down">&darr;</button>
      <button class="qk" data-qk="left">&larr;</button>
      <button class="qk" data-qk="right">&rarr;</button>
      <span class="qk-sep"></span>
      <button class="qk qk-accent" id="qk-select">Sel</button>
    </div>
  </div>

  <!-- Text Select Overlay -->
  <div id="text-select-overlay" class="text-select-overlay hidden">
    <div class="text-select-header">
      <span class="text-select-title">Terminal Text</span>
      <div class="text-select-actions">
        <button id="text-select-copy" class="btn btn-primary">Copy All</button>
        <button id="text-select-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
    <pre id="text-select-content" class="text-select-content"></pre>
  </div>

  <!-- Session Info Overlay -->
  <div id="session-info-overlay" class="session-info-overlay hidden">
    <div class="info-header">
      <span class="info-title" id="info-session-name"></span>
      <button id="info-close" class="btn btn-secondary btn-icon" title="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg></button>
    </div>
    <div class="info-body" id="info-body"></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary btn-modal-icon" title="Cancel"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
        <button id="modal-confirm" class="btn btn-danger btn-modal-icon" title="Confirm"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // PWA install prompt
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-flex';
    });
    installBtn.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
    });
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });
    if (window.matchMedia('(display-mode: standalone)').matches) {
      installBtn.style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        setInterval(() => reg.update(), 60000);
      });
    }

    // Force refresh — clear SW cache and hard reload
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      if ('caches' in window) {
        const names = await caches.keys();
        await Promise.all(names.map(n => caches.delete(n)));
      }
      if (navigator.serviceWorker) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.update();
      }
      window.location.reload(true);
    });
  </script>
</body>
</html>
