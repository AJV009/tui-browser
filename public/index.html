<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TUI">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>TUI Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/terminal.css">
  <link rel="stylesheet" href="/css/info-panel.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <a href="/#dashboard" style="text-decoration:none">
      <h1 id="header-title">TUI Browser <span id="version-label" class="version-label"></span></h1>
      <div class="header-meta-row">
        <span id="updated-label" class="updated-label"></span>
        <span id="connection-mode" class="connection-mode"></span>
      </div>
    </a>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="contrast-btn" class="nav-btn nav-btn-icon" title="Toggle high contrast"><svg id="contrast-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 2v12a6 6 0 0 0 0-12" fill="currentColor"/></svg></button>
      <button id="install-btn" class="nav-btn nav-btn-icon" style="display:none" title="Install App"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M4.5 7L8 10.5 11.5 7"/><path d="M2 12v2h12v-2"/></svg></button>
      <button id="notes-toggle-btn" class="nav-btn nav-btn-icon" title="Notes"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h12v12H2zM5 5h6M5 8h6M5 11h3"/></svg></button>
      <button id="refresh-btn" class="nav-btn nav-btn-icon" title="Force refresh"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4"/><path d="M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1.5v3h3"/><path d="M4.5 14.5v-3h-3"/></svg></button>
      <button id="back-btn" class="nav-btn nav-btn-icon" style="display:none" title="Dashboard"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7.5L8 2l6 5.5"/><path d="M3.5 6.5V14H7v-4h2v4h3.5V6.5"/></svg></button>
    </div>
  </div>

  <!-- Dashboard View -->
  <div id="dashboard-view">
    <div class="dashboard-content">
      <div class="dashboard-toolbar">
        <h2>Sessions</h2>
        <div class="toolbar-right">
          <form id="create-session-form" class="create-form">
            <input id="new-session-name" type="text" placeholder="Session name" autocomplete="off">
            <input id="new-session-cmd" type="text" placeholder="Command (default: bash)" autocomplete="off">
            <div class="create-form-actions">
              <div id="shortcuts-dropdown" class="shortcuts-dropdown">
                <button id="shortcuts-btn" class="btn btn-secondary" type="button"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7.5 1L3 8h3.5L5.5 13 11 6H7.5z"/></svg> Quick Launch</button>
                <div id="shortcuts-menu" class="shortcuts-menu hidden"></div>
              </div>
              <button type="submit" class="btn btn-primary btn-icon" title="New session"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 3v12M3 9h12"/></svg></button>
              <button id="bulk-kill-btn" class="btn btn-danger btn-icon" type="button" title="Kill sessions"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h12M6.5 5V3.75A1.25 1.25 0 0 1 7.75 2.5h2.5a1.25 1.25 0 0 1 1.25 1.25V5M5 5v10a1.5 1.5 0 0 0 1.5 1.5h5a1.5 1.5 0 0 0 1.5-1.5V5M7.75 8v5M10.25 8v5"/></svg><span class="bulk-kill-badge"></span></button>
            </div>
          </form>
          <select id="sort-select" class="sort-select" title="Sort sessions">
            <option value="recent">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="active">Recently active</option>
            <option value="idle">Least active</option>
          </select>
        </div>
      </div>
      <div id="session-list"></div>
    </div>
  </div>

  <!-- Terminal View -->
  <div id="terminal-view" class="hidden">
    <div class="terminal-toolbar">
      <span class="session-label" id="terminal-session-name" title="Click to rename"></span>
      <button id="ai-title-btn" class="ai-title-btn" title="AI-generate title"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5l1.2 3.3 3.3 1.2-3.3 1.2L8 10.5 6.8 7.2 3.5 6 6.8 4.8z"/><path d="M3 12l.6 1.4L5 14l-1.4.6L3 16l-.6-1.4L1 14l1.4-.6z"/><path d="M12 10l.5 1 1 .5-1 .5-.5 1-.5-1-1-.5 1-.5z"/></svg></button>
      <input class="session-label-edit hidden" id="terminal-session-name-edit" type="text" autocomplete="off" spellcheck="false">
      <div class="connection-status">
        <button id="claude-remote-btn" class="toolbar-icon-btn claude-remote-btn" style="display:none" title="Claude Remote Control"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="m3.127 10.604 3.135-1.76.053-.153-.053-.085H6.11l-.525-.032-1.791-.048-1.554-.065-1.505-.08-.38-.081L0 7.832l.036-.234.32-.214.455.04 1.009.069 1.513.105 1.097.064 1.626.17h.259l.036-.105-.089-.065-.068-.064-1.566-1.062-1.695-1.121-.887-.646-.48-.327-.243-.306-.104-.67.435-.48.585.04.15.04.593.456 1.267.981 1.654 1.218.242.202.097-.068.012-.049-.109-.181-.9-1.626-.96-1.655-.428-.686-.113-.411a2 2 0 0 1-.068-.484l.496-.674L4.446 0l.662.089.279.242.411.94.666 1.48 1.033 2.014.302.597.162.553.06.17h.105v-.097l.085-1.134.157-1.392.154-1.792.052-.504.25-.605.497-.327.387.186.319.456-.045.294-.19 1.23-.37 1.93-.243 1.29h.142l.161-.16.654-.868 1.097-1.372.484-.545.565-.601.363-.287h.686l.505.751-.226.775-.707.895-.585.759-.839 1.13-.524.904.048.072.125-.012 1.897-.403 1.024-.186 1.223-.21.553.258.06.263-.218.536-1.307.323-1.533.307-2.284.54-.028.02.032.04 1.029.098.44.024h1.077l2.005.15.525.346.315.424-.053.323-.807.411-3.631-.863-.872-.218h-.12v.073l.726.71 1.331 1.202 1.667 1.55.084.383-.214.302-.226-.032-1.464-1.101-.565-.497-1.28-1.077h-.084v.113l.295.432 1.557 2.34.08.718-.112.234-.404.141-.444-.08-.911-1.28-.94-1.44-.759-1.291-.093.053-.448 4.821-.21.246-.484.186-.403-.307-.214-.496.214-.98.258-1.28.21-1.016.19-1.263.112-.42-.008-.028-.092.012-.953 1.307-1.448 1.957-1.146 1.227-.274.109-.477-.247.045-.44.266-.39 1.586-2.018.956-1.25.617-.723-.004-.105h-.036l-4.212 2.736-.75.096-.324-.302.04-.496.154-.162 1.267-.871z"/></svg></button>
        <button id="reconnect-btn" class="toolbar-icon-btn reconnect-btn" style="display:none" title="Reconnect"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4"/><path d="M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1.5v3h3"/><path d="M4.5 14.5v-3h-3"/></svg></button>
        <span class="status-dot" id="terminal-status-dot"></span>
        <span id="terminal-status-text">Disconnected</span>
        <button id="terminal-kill-btn" class="toolbar-icon-btn terminal-kill-btn" title="Kill session"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10M5.5 4.5V3.25a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V4.5M4.5 4.5v8.5a1.5 1.5 0 0 0 1.5 1.5h4a1.5 1.5 0 0 0 1.5-1.5V4.5M7 7v4.5M9 7v4.5"/></svg></button>
      </div>
    </div>
    <div id="terminal-container"></div>
    <div id="scroll-controls" class="scroll-controls">
      <div class="zoom-pill">
        <button id="zoom-in-btn" class="zoom-pill-btn" title="Zoom in">+</button>
        <span id="zoom-level" class="zoom-pill-level"><span id="zoom-value">14</span></span>
        <button id="zoom-out-btn" class="zoom-pill-btn" title="Zoom out">-</button>
      </div>
      <div class="scroll-pill">
        <button id="scroll-up" class="scroll-pill-btn" title="Scroll up">&uarr;</button>
        <span class="scroll-pill-icon"><svg width="12" height="16" viewBox="0 0 12 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="10" height="14" rx="5"/><line x1="6" y1="4" x2="6" y2="7"/></svg></span>
        <button id="scroll-down" class="scroll-pill-btn" title="Scroll down">&darr;</button>
      </div>
      <div class="text-input-pill">
        <button id="text-input-toggle" class="text-input-pill-btn" title="Send text"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M3 8h7M3 12h9"/></svg></button>
      </div>
      <div class="keyboard-pill">
        <button id="keyboard-toggle-btn" class="keyboard-pill-btn" title="Toggle keyboard"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="4" width="15" height="10" rx="2"/><path d="M4.5 7h1M8.5 7h1M12.5 7h1M4.5 10h1M6.5 10h5M12.5 10h1"/></svg></button>
      </div>
    </div>
    <div id="terminal-quickbar" class="terminal-quickbar">
      <div class="qk-pages-area" id="qk-pages-area">
        <button class="qk-arrow qk-arrow-left" id="qk-arrow-left" aria-label="Previous page">&lsaquo;</button>
        <button class="qk-arrow qk-arrow-right" id="qk-arrow-right" aria-label="Next page">&rsaquo;</button>
        <div class="qk-pages" id="qk-pages">
          <div class="qk-page">
            <button class="qk" data-qk="esc">Esc</button>
            <button class="qk" data-qk="tab">Tab</button>
            <button class="qk" data-qk="shift-tab">^Tab</button>
            <button class="qk" data-qk="enter">Enter</button>
          </div>
          <div class="qk-page">
            <button class="qk" data-qk="ctrl-c">^C</button>
            <button class="qk" data-qk="ctrl-d">^D</button>
            <button class="qk" data-qk="ctrl-z">^Z</button>
          </div>
          <div class="qk-page">
            <button class="qk" data-qk="up">&uarr;</button>
            <button class="qk" data-qk="down">&darr;</button>
            <button class="qk" data-qk="left">&larr;</button>
            <button class="qk" data-qk="right">&rarr;</button>
          </div>
        </div>
        <div class="qk-dots" id="qk-dots">
          <span class="qk-dot active" data-dot="0"></span>
          <span class="qk-dot" data-dot="1"></span>
          <span class="qk-dot" data-dot="2"></span>
        </div>
      </div>
      <span class="qk-anchor-sep"></span>
      <button class="qk qk-accent" id="qk-select">Sel</button>
      <button class="qk qk-accent" id="qk-text-input" title="Text input"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3z"/></svg></button>
    </div>
    <div id="text-input-panel" class="text-input-panel hidden">
      <div class="text-input-header">
        <span class="text-input-label">Send Text</span>
        <button id="text-input-close" class="text-input-header-btn" title="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg></button>
      </div>
      <div id="sent-history-panel" class="sent-history-panel hidden">
        <div class="sent-history-content" id="sent-history-content"></div>
      </div>
      <div class="text-input-body">
        <button id="text-input-notes-btn" class="text-input-body-btn" title="History & Notes"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h12v12H2zM5 5h6M5 8h6M5 11h3"/></svg></button>
        <textarea id="text-input-area" rows="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Type text to send..."></textarea>
        <button id="text-input-expand" class="text-input-body-btn" title="Expand"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1h4v4M5 13H1V9M13 1L8.5 5.5M1 13l4.5-4.5"/></svg></button>
        <button id="text-input-send" class="text-input-send-btn" title="Send"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12V4M4.5 7.5L8 4l3.5 3.5"/></svg></button>
      </div>
      <div class="text-input-hint">Enter to send · Shift+Enter for newline · Esc to close</div>
    </div>
  </div>

  <!-- Notes Overlay -->
  <div id="notes-overlay" class="notes-overlay hidden">
    <div class="notes-overlay-header">
      <span class="notes-overlay-title">Notes</span>
      <div class="notes-overlay-actions">
        <button id="notes-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
    <div class="notes-overlay-hint" id="notes-overlay-hint">Tap a note to copy it</div>
    <div class="notes-overlay-add">
      <textarea id="notes-add-input" class="notes-add-input" rows="1" placeholder="Add a note…" autocomplete="off"></textarea>
      <button id="notes-add-btn" class="notes-add-btn" title="Add note"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg></button>
    </div>
    <div class="notes-overlay-list" id="notes-overlay-list"></div>
  </div>

  <!-- Text Select Overlay -->
  <div id="text-select-overlay" class="text-select-overlay hidden">
    <div class="text-select-header">
      <span class="text-select-title">Terminal Text</span>
      <div class="text-select-actions">
        <button id="text-select-copy" class="btn btn-primary">Copy All</button>
        <button id="text-select-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
    <pre id="text-select-content" class="text-select-content"></pre>
  </div>

  <!-- Session Info Overlay -->
  <div id="session-info-overlay" class="session-info-overlay hidden">
    <div class="info-header">
      <span class="info-title" id="info-session-name"></span>
      <button id="info-close" class="btn btn-secondary btn-icon" title="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg></button>
    </div>
    <div class="info-body" id="info-body"></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary btn-modal-icon" title="Cancel"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>
        <button id="modal-confirm" class="btn btn-danger btn-modal-icon" title="Confirm"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 4"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="/js/dashboard-shortcuts.js"></script>
  <script src="/js/dashboard-bulk-kill.js"></script>
  <script src="/js/dashboard-info.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/terminal-notes.js"></script>
  <script src="/js/terminal-text-input.js"></script>
  <script src="/js/terminal-controls.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/app-network.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // PWA install prompt
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-flex';
    });
    installBtn.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
    });
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });
    if (window.matchMedia('(display-mode: standalone)').matches) {
      installBtn.style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        setInterval(() => reg.update(), 60000);
      });
    }

    // Force refresh — clear SW cache and hard reload
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      if ('caches' in window) {
        const names = await caches.keys();
        await Promise.all(names.map(n => caches.delete(n)));
      }
      if (navigator.serviceWorker) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.update();
      }
      window.location.reload(true);
    });
  </script>
</body>
</html>
