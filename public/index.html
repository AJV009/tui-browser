<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TUI">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>TUI Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <a href="/#dashboard" style="text-decoration:none"><h1 id="header-title">TUI Browser</h1></a>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="install-btn" class="nav-btn" style="display:none">Install App</button>
      <button id="back-btn" class="nav-btn" style="display:none">Dashboard</button>
    </div>
  </div>

  <!-- Dashboard View -->
  <div id="dashboard-view">
    <div class="dashboard-content">
      <div class="dashboard-toolbar">
        <h2>Sessions</h2>
        <form id="create-session-form" class="create-form">
          <input id="new-session-name" type="text" placeholder="Session name" autocomplete="off">
          <input id="new-session-cmd" type="text" placeholder="Command (default: bash)" autocomplete="off">
          <button type="submit" class="btn btn-primary">New Session</button>
        </form>
      </div>
      <div id="session-list"></div>
    </div>
  </div>

  <!-- Terminal View -->
  <div id="terminal-view" class="hidden">
    <div class="terminal-toolbar">
      <span class="session-label" id="terminal-session-name"></span>
      <div class="zoom-controls">
        <button id="zoom-out-btn" class="zoom-btn" title="Zoom out">-</button>
        <span id="zoom-level">14</span>
        <button id="zoom-in-btn" class="zoom-btn" title="Zoom in">+</button>
      </div>
      <div class="connection-status">
        <button id="reconnect-btn" class="reconnect-btn" style="display:none" title="Reconnect">&#9889;</button>
        <span class="status-dot" id="terminal-status-dot"></span>
        <span id="terminal-status-text">Disconnected</span>
      </div>
    </div>
    <div id="terminal-container"></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn btn-danger">Kill</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // PWA install prompt
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-flex';
    });
    installBtn.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
    });
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });
    if (window.matchMedia('(display-mode: standalone)').matches) {
      installBtn.style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        setInterval(() => reg.update(), 60000);
      });
    }
  </script>
</body>
</html>
