<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#000"/>

  <!-- Terminal window -->
  <rect x="48" y="100" width="416" height="312" rx="32" fill="url(#termGrad)" stroke="#252525" stroke-width="3"/>

  <!-- Title bar dots -->
  <circle cx="88" cy="132" r="12" fill="#ff4057"/>
  <circle cx="122" cy="132" r="12" fill="#fb923c"/>
  <circle cx="156" cy="132" r="12" fill="#00e5a0"/>

  <!-- Divider line -->
  <line x1="48" y1="160" x2="464" y2="160" stroke="#252525" stroke-width="2"/>

  <!-- Prompt chevron -->
  <path d="M100 230 L160 280 L100 330" fill="none" stroke="#00e5a0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <line x1="190" y1="306" x2="340" y2="306" stroke="#00e5a0" stroke-width="12" stroke-linecap="round" opacity="0.4"/>

  <!-- Ethernet badge — rounded square, top right, mostly inside terminal -->
  <g transform="translate(380, 160)">
    <!-- Badge background -->
    <rect x="-110" y="-110" width="220" height="220" rx="40" fill="#000" opacity="0.9" stroke="#252525" stroke-width="2"/>

    <!-- Ethernet icon scaled to fill the badge -->
    <g transform="translate(-75, -75) scale(9.4)" fill="#00e5a0">
      <!-- Connector body -->
      <path d="M14 13.5v-7a.5.5 0 0 0-.5-.5H12V4.5a.5.5 0 0 0-.5-.5h-1v-.5A.5.5 0 0 0 10 3H6a.5.5 0 0 0-.5.5V4h-1a.5.5 0 0 0-.5.5V6H2.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5M3.75 11h.5a.25.25 0 0 1 .25.25v1.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25v-1.5a.25.25 0 0 1 .25-.25m2 0h.5a.25.25 0 0 1 .25.25v1.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25v-1.5a.25.25 0 0 1 .25-.25m1.75.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v1.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25zM9.75 11h.5a.25.25 0 0 1 .25.25v1.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25v-1.5a.25.25 0 0 1 .25-.25m1.75.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v1.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25z"/>
    </g>
  </g>
</svg>
